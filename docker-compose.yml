services:
  postgres:
    image: postgres:17
    container_name: learning-academy-db
    environment:
      POSTGRES_USER: german_user
      POSTGRES_PASSWORD: german_password
      POSTGRES_DB: german_academy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U german_user -d german_academy"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-academy-backend
    ports:
      - "5002:5001"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learning-network
    restart: unless-stopped
    command: sh -c "sleep 10 && node server.js"

volumes:
  postgres_data:

networks:
  learning-network:
    driver: bridge
