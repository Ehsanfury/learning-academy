# docker-compose.yml
# Path: docker-compose.yml
# Description: Docker Compose for development with Redis, logging, healthcheck
# Version: 2.0 - Improved

services:
  # ============================================
  # 🗄️ PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:17-alpine
    container_name: learning-academy-db
    environment:
      POSTGRES_USER: ${DB_USER:-german_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-german_password}
      POSTGRES_DB: ${DB_NAME:-german_academy}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learning-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-german_user} -d ${DB_NAME:-german_academy}",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 🟥 Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: learning-academy-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - learning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # 🚀 Backend API
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-academy-backend
    ports:
      - "5001:5001"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_USER: ${DB_USER:-german_user}
      DB_PASSWORD: ${DB_PASSWORD:-german_password}
      DB_NAME: ${DB_NAME:-german_academy}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learning-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5001/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================
  # 🌐 Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: learning-academy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - learning-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================
  # 📊 Prometheus (Monitoring - Optional)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: learning-academy-prometheus
    profiles: ["monitoring"] # Only starts with --profile monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - learning-network
    restart: unless-stopped

  # ============================================
  # 📈 Grafana (Dashboards - Optional)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: learning-academy-grafana
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - learning-network
    depends_on:
      - prometheus
    restart: unless-stopped

# ============================================
# 📦 Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  prometheus_data:
  grafana_data:

# ============================================
# 🌐 Networks
# ============================================
networks:
  learning-network:
    driver: bridge
