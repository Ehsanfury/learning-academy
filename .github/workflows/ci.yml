name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint || true

      - name: Build Frontend
        run: npm run build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_SSL: "false"
      JWT_SECRET: test-jwt-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-32-chars-different
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SESSION_SECRET: test-session-secret-at-least-32-characters-long
      ADMIN_EMAIL: admin@test.com
      ADMIN_PASSWORD: test-admin-password-not-default
      CORS_ORIGIN: http://localhost:3000
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Lint Backend
        working-directory: backend
        run: npm run lint || true

      - name: Run Backend Migrations
        working-directory: backend
        run: npm run migrate

      - name: Run Backend Tests
        working-directory: backend
        run: npm test

      - name: Security Audit
        working-directory: backend
        run: npm audit --audit-level=high || true

  build-docker:
    needs: [lint-and-test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: learning-academy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run security scan on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: learning-academy:latest
          severity: CRITICAL,HIGH
          exit-code: "0"
