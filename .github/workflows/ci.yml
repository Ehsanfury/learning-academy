name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint || echo "No lint script found"

      - name: Lint Frontend
        run: npm run lint || echo "No lint script found"

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test || echo "No tests found"
        env:
          NODE_ENV: test
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          JWT_SECRET: test_secret_key_12345678901234567890
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d

      - name: Run Frontend Tests
        run: npm test || echo "No tests found"

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001
          VITE_APP_TITLE: German Academy

  # ============================================
  # ✅ Optional: Docker Build Test
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: docker build -t learning-academy:test .

      - name: Test Docker Container
        run: |
          docker run -d --name test-app -p 5001:5001 learning-academy:test
          sleep 10
          curl -f http://localhost:5001/health || exit 1
          docker stop test-app
          docker rm test-app
